  },
  async upsertOrg(org){
    if(sb){
      if(org.id&&org.id>1000000000000){await sb.from("organisationen").upsert(org);return org;}
      const{data}=await sb.from("organisationen").insert({...org,id:undefined}).select().single();return data||org;
    }
    try{const all=JSON.parse(localStorage.getItem("t-orgs")||"[]");const saved={...org,id:org.id||Date.now()};const idx=all.findIndex(o=>o.id===saved.id);if(idx>=0)all[idx]=saved;else all.push(saved);localStorage.setItem("t-orgs",JSON.stringify(all));return saved;}catch{return org;}
  },
  async deleteOrg(id){
    if(sb){await sb.from("organisationen").delete().eq("id",id);return;}
    try{const all=JSON.parse(localStorage.getItem("t-orgs")||"[]");localStorage.setItem("t-orgs",JSON.stringify(all.filter(o=>o.id!==id)));}catch{}
  },
  async loadEvents(){

  },
  async insertEvent(ev){
    if(sb){const{data}=await sb.from("veranstaltungen").insert({...ev,id:undefined}).select().single();return data||ev;}
    try{const all=JSON.parse(localStorage.getItem("t-evs")||"[]");const n={...ev,id:Date.now()};all.push(n);localStorage.setItem("t-evs",JSON.stringify(all));return n;}catch{return ev;}

async function claudeJSON(system,userText,image){
  // API key is handled server-side
  let content;
  if(image){
    if(image.type==="application/pdf"){
      content=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:image.data}},{type:"text",text:userText}];
    }else{
      content=[{type:"image",source:{type:"base64",media_type:image.type||"image/jpeg",data:image.data}},{type:"text",text:userText}];
    }
  }else{content=userText;}
  const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system,messages:[{role:"user",content}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return JSON.parse(d.content.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim());
}

function EventBanner({events,meinBezirk,onSwitch}){
  const today=new Date();today.setHours(0,0,0,0);
  const up=events.filter(e=>{
    if(e.datum&&new Date(e.datum+"T12:00:00")<today)return false;
    if(meinBezirk!=="Alle Bezirke"&&e.bezirk&&e.bezirk!=="Alle Bezirke"&&e.bezirk!==meinBezirk)return false;
    return true;
  }).sort((a,b)=>(a.datum||"9")<(b.datum||"9")?-1:1).slice(0,3);
  if(!up.length)return null;
  const df=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("de-DE",{day:"numeric",month:"long"});}catch{return d;}};
  const db=d=>{if(!d)return null;const n=Math.ceil((new Date(d+"T12:00:00")-today)/86400000);return n===0?"Heute":n===1?"Morgen":n<=7?"In "+n+" Tagen":null;};
  return React.createElement("div",{onClick:onSwitch,style:{background:"#ff613d",padding:"8px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",cursor:"pointer"}},
    React.createElement("span",{style:{color:"#fff",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.8,whiteSpace:"nowrap"}},"📅 Aktuell"),
    React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap",flex:1}},
